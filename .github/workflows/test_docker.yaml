name: Docker Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create empty .env file
        run: |
          touch .env
      - name: Build and Start Containers
        run: docker compose up -d --build --wait

      # TODO: re-enable once the empty initial migration is rewritten to
      # actually create the tables. Today init_db() in the FastAPI lifespan
      # calls SQLModel.metadata.create_all with the current schema, which
      # then collides with `ALTER TABLE score ADD short_description_fr`
      # in migration 4a2b2b8b97b4.
      # - name: Run Alembic migrations
      #   run: docker compose exec -T --workdir /app/backend backend alembic upgrade head

      - name: Run Backend Tests
        # Run your pytest suite inside the running container
        run: docker compose exec -T backend pytest backend

      - name: Check Container Logs (If failed)
        if: failure()
        run: docker compose logs

      - name: Stop Containers
        if: always()
        run: docker compose down
