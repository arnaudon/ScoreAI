repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
        files: ^(backend|shared)/.*\.py$
      - id: ruff-format
        files: ^(backend|shared)/.*\.py$

  - repo: local
    hooks:
      - id: mypy-backend
        name: mypy (backend)
        language: system
        types: [python]
        files: ^backend/.*\.py$
        entry: uv run --frozen --project backend --directory backend mypy
        pass_filenames: false
        args: ["."]

      - id: mypy-shared
        name: mypy (shared)
        language: system
        types: [python]
        files: ^shared/.*\.py$
        entry: uv run --frozen --project shared --directory shared mypy
        pass_filenames: false
        args: ["."]

      - id: svelte-check
        name: svelte-check
        language: system
        files: ^frontend-svelte/ui/.*\.(ts|svelte|js)$
        entry: bash -c 'cd frontend-svelte/ui && npm run check'
        pass_filenames: false

      - id: svelte-lint
        name: svelte-lint
        language: system
        files: ^frontend-svelte/ui/.*\.(ts|svelte|js)$
        entry: bash -c 'cd frontend-svelte/ui && npm run lint'
        pass_filenames: false
